<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FreshFun Games</title>
<link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;500;600;700&family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
<link href="style.css" rel="stylesheet">
</head>
<body>

<header>
  <div class="logo"><span class="fresh fun">FreshFun</span> Games</div>
  <div class="tagline">Little games, made for fun.</div>
</header>

<main class="games">

  <!-- CHROMATIC PHYSICS -->
  <button class="game-card" id="chromaCard" aria-label="Play Chromatic Physics">
    <div class="thumb-wrap">
      <canvas class="thumb" id="chromaThumb" width="320" height="200"></canvas>
    </div>
    <div class="card-body">
      <div class="card-name">Chromatic Physics</div>
      <div class="card-desc">A ball, a circle, and total rainbow chaos.</div>
      <span class="card-tag">Play</span>
    </div>
  </button>

  <!-- placeholders: copy this block when you add a new game -->
  <div class="game-card locked">
    <div class="thumb-wrap"><div class="locked-thumb">?</div></div>
    <div class="card-body">
      <div class="card-name">Mystery Game</div>
      <div class="card-desc">Something new is cooking&hellip;</div>
      <span class="card-tag">Coming soon</span>
    </div>
  </div>

  <div class="game-card locked">
    <div class="thumb-wrap"><div class="locked-thumb">?</div></div>
    <div class="card-body">
      <div class="card-name">Mystery Game</div>
      <div class="card-desc">Something new is cooking&hellip;</div>
      <span class="card-tag">Coming soon</span>
    </div>
  </div>

</main>

<footer>FreshFun Games &middot; v1.0</footer>

<!-- game loads right here, no leaving the page -->
<div id="gameOverlay">
  <iframe id="gameFrame" title="Chromatic Physics" allow="autoplay"></iframe>
</div>
<button id="exitGameBtn">&larr; FreshFun</button>

<script src="script.js"></script>
</body>
</html>
