<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FreshFun Games</title>
<link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;500;600;700&family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
</head>
<body>

<header>
  <div class="logo"><span class="fresh">FreshFun</span> Games</div>
  <p class="tagline">Little games. Big fun. No downloads.</p>
</header>

<main class="games">

  <!-- The Timeline -->
  <button class="game-card" data-game="timeline/index.html" data-title="The Timeline">
    <div class="thumb">
      <canvas id="timelineThumb" width="300" height="170"></canvas>
    </div>
    <div class="card-body">
      <h2>The Timeline</h2>
      <p>Nudge one tiny moment, then slide 100 years into the future and watch the world unravel.</p>
      <span class="play-pill">Play</span>
    </div>
  </button>

  <!-- Coming soon -->
  <div class="game-card soon">
    <div class="thumb soon-thumb"><span>?</span></div>
    <div class="card-body">
      <h2>Coming soon</h2>
      <p>A new game is brewing. Check back later!</p>
    </div>
  </div>

  <div class="game-card soon">
    <div class="thumb soon-thumb"><span>?</span></div>
    <div class="card-body">
      <h2>Coming soon</h2>
      <p>A new game is brewing. Check back later!</p>
    </div>
  </div>

</main>

<!-- Fullscreen game overlay -->
<div class="game-overlay" id="gameOverlay" aria-hidden="true">
  <button class="back-pill" id="backBtn">&larr; FreshFun</button>
  <iframe id="gameFrame" title="Game" allow="autoplay"></iframe>
</div>

<script src="script.js"></script>
</body>
</html>
